name: Build

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  build:
    name: Build for ${{ matrix.os-name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            os-name: Linux
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            os-name: Windows
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            os-name: macOS-Intel
            target: x86_64-apple-darwin
          - os: macos-latest
            os-name: macOS-Arm64
            target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: litv-${{ matrix.os-name }}
          path: target/${{ matrix.target }}/release/litv*